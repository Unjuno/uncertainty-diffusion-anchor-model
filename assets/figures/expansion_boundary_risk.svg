<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Expansion with boundary risk</title>
  <desc id="desc">Decision diagram showing that local success is evidence, not permission; an expansion factor must pass value, cost, correction, and boundary-risk checks.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#444"/></marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #222; font-size: 18px; }
      .title { font-size: 28px; font-weight: 700; }
      .box { fill: #e7f1ff; stroke: #084298; stroke-width: 2; rx: 10; }
      .check { fill: #fff3cd; stroke: #b58100; stroke-width: 2; rx: 10; }
      .ok { fill: #d1e7dd; stroke: #0f5132; stroke-width: 2; rx: 10; }
      .stop { fill: #f8d7da; stroke: #842029; stroke-width: 2; rx: 10; }
      .formula { fill: #e2e3e5; stroke: #41464b; stroke-width: 2; rx: 10; }
      .warn { fill: #fff3cd; stroke: #b58100; stroke-width: 2; rx: 10; }
      .edge { stroke: #444; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .small { font-size: 15px; }
    </style>
  </defs>
  <rect width="1200" height="820" fill="#fff"/>
  <text x="60" y="52" class="title">Expansion with boundary risk</text>

  <rect x="80" y="90" width="280" height="60" class="box"/><text x="118" y="126">Favorable local result</text>
  <rect x="450" y="90" width="290" height="60" class="check"/><text x="488" y="126">Candidate expansion r_i</text>
  <rect x="830" y="90" width="290" height="60" class="box"/><text x="868" y="126">s_{i+1} = r_i s_i</text>
  <path d="M360 120 H450" class="edge"/><path d="M740 120 H830" class="edge"/>

  <rect x="100" y="240" width="420" height="90" class="formula"/><text x="132" y="272">Left side</text><text x="132" y="302">B_expand(r_i) + I_expand(r_i)</text>
  <rect x="680" y="240" width="420" height="90" class="formula"/><text x="712" y="272">Right side</text><text x="712" y="302">C_obs + P_boundary C_boundary + C_correct</text>
  <path d="M975 150 V205 H310 V240" class="edge"/><path d="M975 150 V205 H890 V240" class="edge"/>

  <rect x="420" y="410" width="360" height="80" class="check"/><text x="470" y="440">Expansion inequality holds?</text><text x="465" y="466" class="small">benefit + information &gt; costs + risk</text>
  <path d="M310 330 V370 H600 V410" class="edge"/><path d="M890 330 V370 H600 V410" class="edge"/>

  <rect x="130" y="570" width="300" height="75" class="stop"/><text x="165" y="602">Do not expand</text><text x="165" y="626" class="small">Hold, reduce, or observe differently.</text>
  <rect x="530" y="570" width="300" height="75" class="check"/><text x="568" y="602">Boundary risk acceptable?</text>
  <rect x="900" y="570" width="240" height="75" class="ok"/><text x="932" y="602">Expand by selected r_i</text><text x="932" y="626" class="small">Then re-evaluate.</text>
  <path d="M510 490 V532 H280 V570" class="edge"/>
  <path d="M690 490 V570" class="edge"/>
  <path d="M830 607 H900" class="edge"/>

  <rect x="150" y="710" width="340" height="55" class="warn"/><text x="180" y="744">Local success is evidence, not permission.</text>
  <rect x="610" y="710" width="350" height="55" class="warn"/><text x="640" y="744">r_i is selected, not automatically 2.</text>
</svg>
