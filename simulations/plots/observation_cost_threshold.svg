<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
<title id="title">Observation-cost threshold sensitivity</title>
<desc id="desc">Toy check: more accurate signals tolerate higher observation cost before OV stops being favorable.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
  .title { font-size: 24px; font-weight: 700; }
  .subtitle { font-size: 14px; fill: #4b5563; }
  .axis { stroke: #111827; stroke-width: 1.4; }
  .grid { stroke: #e5e7eb; stroke-width: 1; }
  .zero { stroke: #6b7280; stroke-width: 1.5; stroke-dasharray: 5 5; }
  .series { fill: none; stroke: #2563eb; stroke-width: 3; }
  circle { fill: #2563eb; }
  .tick { font-size: 12px; fill: #4b5563; }
  .label { font-size: 14px; font-weight: 600; fill: #374151; }
</style>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="90" y="35" class="title">Observation-cost threshold sensitivity</text>
<text x="90" y="56" class="subtitle">Toy check: higher signal accuracy raises break-even observation cost.</text>
<line x1="85" y1="440" x2="860" y2="440" class="zero"/><text x="80" y="444" class="tick" text-anchor="end">0</text>
<line x1="85" y1="358" x2="860" y2="358" class="grid"/><text x="80" y="362" class="tick" text-anchor="end">2</text>
<line x1="85" y1="276" x2="860" y2="276" class="grid"/><text x="80" y="280" class="tick" text-anchor="end">4</text>
<line x1="85" y1="194" x2="860" y2="194" class="grid"/><text x="80" y="198" class="tick" text-anchor="end">6</text>
<line x1="85" y1="112" x2="860" y2="112" class="grid"/><text x="80" y="116" class="tick" text-anchor="end">8</text>
<line x1="90" y1="70" x2="90" y2="440" class="axis"/>
<line x1="90" y1="440" x2="860" y2="440" class="axis"/>
<polyline points="90,440 176,399 261,358 347,317 432,276 518,235 603,194 689,153 774,112 860,71" class="series"/>
<circle cx="90" cy="440" r="4"><title>accuracy=0.50, threshold=0.00</title></circle>
<circle cx="176" cy="399" r="4"><title>accuracy=0.55, threshold=1.00</title></circle>
<circle cx="261" cy="358" r="4"><title>accuracy=0.60, threshold=2.00</title></circle>
<circle cx="347" cy="317" r="4"><title>accuracy=0.65, threshold=3.00</title></circle>
<circle cx="432" cy="276" r="4"><title>accuracy=0.70, threshold=4.00</title></circle>
<circle cx="518" cy="235" r="4"><title>accuracy=0.75, threshold=5.00</title></circle>
<circle cx="603" cy="194" r="4"><title>accuracy=0.80, threshold=6.00</title></circle>
<circle cx="689" cy="153" r="4"><title>accuracy=0.85, threshold=7.00</title></circle>
<circle cx="774" cy="112" r="4"><title>accuracy=0.90, threshold=8.00</title></circle>
<circle cx="860" cy="71" r="4"><title>accuracy=0.95, threshold=9.00</title></circle>
<text x="475" y="495" class="label" text-anchor="middle">Signal accuracy</text>
<text x="24" y="255" class="label" transform="rotate(-90 24 255)" text-anchor="middle">Break-even observation cost</text>
</svg>
